notes: >
  Compares Supply Die (C4) and Unit Cohesion Die (C6) against three grief-adjacent
  baselines (C1-C3) and two no-resource campaigns (C5, C7). Both resource mechanics
  produced monotone Character Agency score increases under depletion. Supply Die
  advantage: +0.6 CA points over light baselines. Cohesion Die advantage: +3.0
  panel-session advantage in S5-S7 (three consecutive character-primary verdicts).
  Argues resource exhaustion amplifies, not suppresses, character decision-making
  when resource is legible and emotionally architectured. Sections: Introduction,
  Related Work, The Two Mechanics, Evaluation, Discussion, Conclusion.
